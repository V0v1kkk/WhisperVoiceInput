name: Publish Application

on:
  workflow_dispatch:
    inputs:
      versionOverride:
        description: 'Override version (leave empty to use project version with auto-incremented patch)'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --configuration Release --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set version
        id: set-version
        run: |
          # Extract version prefix from project file
          VERSION_PREFIX=$(grep -oP '<VersionPrefix>\K[^<]+' WhisperVoiceInput/WhisperVoiceInput.csproj)
          
          if [ -n "${{ github.event.inputs.versionOverride }}" ]; then
            # Use override version if provided
            VERSION="${{ github.event.inputs.versionOverride }}"
          else
            # Use GitHub run number as patch version
            VERSION="${VERSION_PREFIX}.${{ github.run_number }}"
          fi
          
          echo "Using version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build-windows:
    needs: [test, build]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          dotnet publish WhisperVoiceInput/WhisperVoiceInput.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:IncludeAllContentForSelfExtract=true /p:PublishReadyToRun=true /p:DebugType=None /p:DebugSymbols=false /p:Version=${{ needs.build.outputs.version }} /p:AssemblyVersion=${{ needs.build.outputs.version }}

      - name: Create zip archive
        run: |
          $VERSION = "${{ needs.build.outputs.version }}"
          $ZIP_NAME = "WhisperVoiceInput-windows-x64-v$VERSION.zip"
          Compress-Archive -Path WhisperVoiceInput/bin/Release/net9.0/win-x64/publish/* -DestinationPath $ZIP_NAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperVoiceInput-windows-x64
          path: WhisperVoiceInput-windows-x64-v${{ needs.build.outputs.version }}.zip

  build-linux:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          dotnet publish WhisperVoiceInput/WhisperVoiceInput.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:IncludeAllContentForSelfExtract=true /p:PublishReadyToRun=true /p:DebugType=None /p:DebugSymbols=false /p:Version=${{ needs.build.outputs.version }} /p:AssemblyVersion=${{ needs.build.outputs.version }}

      - name: Create zip archive
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ZIP_NAME="WhisperVoiceInput-linux-x64-v$VERSION.zip"
          cd WhisperVoiceInput/bin/Release/net9.0/linux-x64/publish/
          chmod +x WhisperVoiceInput
          zip -r ../../../../../../$ZIP_NAME *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperVoiceInput-linux-x64
          path: WhisperVoiceInput-linux-x64-v${{ needs.build.outputs.version }}.zip

  build-macos:
    needs: [test, build]
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [osx-x64, osx-arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          dotnet publish WhisperVoiceInput/WhisperVoiceInput.csproj -c Release -r ${{ matrix.architecture }} --self-contained true /p:PublishSingleFile=true /p:PublishReadyToRun=true /p:DebugType=None /p:DebugSymbols=false /p:Version=${{ needs.build.outputs.version }} /p:AssemblyVersion=${{ needs.build.outputs.version }}

      - name: Create .icns icon
        run: |
          ICON_DIR=$(mktemp -d)
          ICONSET="$ICON_DIR/WhisperVoiceInput.iconset"
          mkdir -p "$ICONSET"
          SRC="WhisperVoiceInput/Assets/lecturer-white.png"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE "$SRC" --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null
            DOUBLE=$((SIZE * 2))
            if [ $DOUBLE -le 1024 ]; then
              sips -z $DOUBLE $DOUBLE "$SRC" --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png" > /dev/null
            fi
          done
          sips -z 1024 1024 "$SRC" --out "$ICONSET/icon_512x512@2x.png" > /dev/null
          iconutil -c icns "$ICONSET" -o "$ICON_DIR/WhisperVoiceInput.icns"
          echo "ICNS_PATH=$ICON_DIR/WhisperVoiceInput.icns" >> $GITHUB_ENV

      - name: Create .app bundle
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          APP_NAME="WhisperVoiceInput.app"
          PUBLISH_DIR="WhisperVoiceInput/bin/Release/net9.0/${{ matrix.architecture }}/publish"

          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"

          cp -a "$PUBLISH_DIR/." "$APP_NAME/Contents/MacOS/"
          chmod +x "$APP_NAME/Contents/MacOS/WhisperVoiceInput"

          sed "s/VERSION_PLACEHOLDER/$VERSION/g" WhisperVoiceInput/macOS/Info.plist > "$APP_NAME/Contents/Info.plist"

          cp "$ICNS_PATH" "$APP_NAME/Contents/Resources/WhisperVoiceInput.icns"

      - name: Ad-hoc codesign
        run: |
          APP_NAME="WhisperVoiceInput.app"
          find "$APP_NAME/Contents/MacOS" -type f | while read fname; do
            codesign --force --sign - "$fname"
          done
          codesign --force --sign - "$APP_NAME"

      - name: Create zip archive
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ZIP_NAME="WhisperVoiceInput-${{ matrix.architecture }}-v$VERSION.zip"
          zip -r -y "$ZIP_NAME" WhisperVoiceInput.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperVoiceInput-${{ matrix.architecture }}
          path: WhisperVoiceInput-${{ matrix.architecture }}-v${{ needs.build.outputs.version }}.zip

  create-release:
    needs: [test, build, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: |
            artifacts/WhisperVoiceInput-windows-x64/WhisperVoiceInput-windows-x64-v${{ needs.build.outputs.version }}.zip
            artifacts/WhisperVoiceInput-linux-x64/WhisperVoiceInput-linux-x64-v${{ needs.build.outputs.version }}.zip
            artifacts/WhisperVoiceInput-osx-x64/WhisperVoiceInput-osx-x64-v${{ needs.build.outputs.version }}.zip
            artifacts/WhisperVoiceInput-osx-arm64/WhisperVoiceInput-osx-arm64-v${{ needs.build.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}